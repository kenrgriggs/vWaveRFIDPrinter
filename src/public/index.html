<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>vWaveRFIDPrinter</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0d1117;
      --surface:     #161b22;
      --surface2:    #1c2128;
      --border:      #30363d;
      --text:        #c9d1d9;
      --text-dim:    #8b949e;
      --accent:      #58a6ff;
      --green:       #3fb950;
      --yellow:      #d29922;
      --red:         #f85149;
      --cyan:        #56d364;
      --purple:      #bc8cff;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      overflow: hidden;
    }

    /* ─── Layout ─────────────────────────────────────────────────────────── */

    .root {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      flex-shrink: 0;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 16px;
      height: 44px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* Left panel */
    .panel-left {
      width: 46%;
      min-width: 320px;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Right panel */
    .panel-right {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .jobs-pane {
      flex: 0 0 44%;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .log-pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ─── Header ─────────────────────────────────────────────────────────── */

    .logo {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.3px;
      color: var(--accent);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--red);
      flex-shrink: 0;
      transition: background 0.3s, box-shadow 0.3s;
    }
    .status-dot.live {
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
      animation: pulse 2.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.5; }
    }

    .pill {
      font-size: 11px;
      padding: 2px 9px;
      border-radius: 10px;
      background: rgba(88,166,255,.08);
      border: 1px solid rgba(88,166,255,.2);
      color: var(--accent);
      font-family: 'Consolas', monospace;
    }

    .spacer { flex: 1; }

    .btn {
      font-size: 11px;
      padding: 4px 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      transition: border-color .15s, color .15s;
    }
    .btn:hover { border-color: var(--red); color: var(--red); }

    /* ─── Panel headers ──────────────────────────────────────────────────── */

    .pane-header {
      flex-shrink: 0;
      padding: 7px 14px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--text-dim);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ─── Label preview ──────────────────────────────────────────────────── */

    .preview-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    .label-frame {
      background: #fff;
      border-radius: 4px;
      min-height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      margin-bottom: 14px;
      box-shadow: 0 4px 28px rgba(0,0,0,.5);
      position: relative;
    }

    .label-frame img {
      display: block;
      max-width: 100%;
    }

    .label-frame .placeholder {
      padding: 36px 24px;
      text-align: center;
      color: #bbb;
      font-size: 12px;
      line-height: 1.7;
    }

    .label-frame .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid #eee;
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Meta grid */
    .meta-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 10px;
    }

    .meta-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
    }
    .meta-card.wide { grid-column: span 2; }

    .meta-key {
      font-size: 9.5px;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: var(--text-dim);
      margin-bottom: 3px;
    }

    .meta-val {
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 12px;
      color: var(--text);
      word-break: break-all;
    }
    .meta-val.rfid  { color: var(--cyan); }
    .meta-val.epc   { color: var(--purple); font-size: 11px; }
    .meta-val.green { color: var(--green); }

    /* ZPL toggle */
    .zpl-toggle {
      font-size: 11px;
      color: var(--accent);
      cursor: pointer;
      user-select: none;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .zpl-toggle:hover { text-decoration: underline; }

    .zpl-block {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px;
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 11px;
      color: var(--text-dim);
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 220px;
      overflow-y: auto;
      line-height: 1.5;
    }

    /* ─── Jobs list ──────────────────────────────────────────────────────── */

    .jobs-scroll {
      flex: 1;
      overflow-y: auto;
    }

    .empty-msg {
      padding: 28px;
      text-align: center;
      color: var(--text-dim);
      font-size: 12px;
      line-height: 1.7;
    }

    .job-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 14px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background .1s;
    }
    .job-row:hover   { background: rgba(88,166,255,.04); }
    .job-row.active  { background: rgba(88,166,255,.07); border-left: 2px solid var(--accent); }
    .job-row.new-flash { animation: newflash .6s ease-out; }
    @keyframes newflash {
      0%   { background: rgba(63,185,80,.18); }
      100% { background: transparent; }
    }

    .job-num  { font-size: 11px; font-weight: 700; color: var(--accent); min-width: 30px; font-family: monospace; }
    .job-time { font-size: 11px; color: var(--text-dim); font-family: monospace; white-space: nowrap; }
    .job-addr { font-size: 11px; color: var(--text-dim); font-family: monospace; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .job-rfid { font-size: 10px; color: var(--cyan); font-family: monospace; max-width: 110px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .badge {
      font-size: 9.5px;
      padding: 1px 7px;
      border-radius: 10px;
      white-space: nowrap;
      font-weight: 600;
      letter-spacing: .3px;
    }
    .badge-rendered     { background: rgba(63,185,80,.15);   color: var(--green);  }
    .badge-rendering    { background: rgba(88,166,255,.15);  color: var(--accent); }
    .badge-render_failed{ background: rgba(248,81,73,.15);   color: var(--red);    }

    /* ─── Log pane ───────────────────────────────────────────────────────── */

    .log-scroll {
      flex: 1;
      overflow-y: auto;
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 11.5px;
      padding: 3px 0;
    }

    .log-row {
      display: flex;
      gap: 8px;
      padding: 1px 14px;
      line-height: 1.55;
      overflow: hidden;
    }
    .log-row:hover { background: rgba(255,255,255,.02); overflow: visible; white-space: normal; }

    .log-ts    { color: var(--text-dim); flex-shrink: 0; }
    .log-lvl   { flex-shrink: 0; min-width: 42px; font-weight: 700; }
    .lvl-info  { color: var(--accent); }
    .lvl-warn  { color: var(--yellow); }
    .lvl-error { color: var(--red); }
    .lvl-debug { color: #555; }
    .log-msg   { color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .log-row:hover .log-msg { white-space: normal; overflow: visible; }

    /* ─── Scrollbars ─────────────────────────────────────────────────────── */
    ::-webkit-scrollbar       { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #484f58; }
  </style>
</head>
<body>
<div class="root">

  <!-- ── Header ──────────────────────────────────────────────────────────── -->
  <header>
    <div class="status-dot" id="statusDot"></div>
    <div class="logo">vWaveRFIDPrinter</div>
    <div class="pill">TCP :9100</div>
    <div class="pill" id="pillJobs">Jobs: 0</div>
    <div class="spacer"></div>
    <button class="btn" onclick="clearAll()">Clear All</button>
  </header>

  <!-- ── Main ────────────────────────────────────────────────────────────── -->
  <div class="main">

    <!-- Left: label preview -->
    <div class="panel-left">
      <div class="pane-header">
        Label Preview
        <span id="previewBadge" style="color:var(--accent);font-size:12px;font-weight:700;letter-spacing:0;text-transform:none;"></span>
      </div>
      <div class="preview-scroll" id="previewArea">
        <div class="label-frame" id="labelFrame">
          <div class="placeholder">No jobs yet.<br>Send a ZPL print job to <strong>TCP :9100</strong>.</div>
        </div>
        <div id="metaArea"></div>
      </div>
    </div>

    <!-- Right: jobs + logs -->
    <div class="panel-right">

      <!-- Jobs -->
      <div class="jobs-pane">
        <div class="pane-header">Print Queue</div>
        <div class="jobs-scroll" id="jobsList">
          <div class="empty-msg">Waiting for print jobs&hellip;</div>
        </div>
      </div>

      <!-- Logs -->
      <div class="log-pane">
        <div class="pane-header">
          System Log
          <div class="spacer"></div>
          <label style="font-size:11px;color:var(--text-dim);cursor:pointer;font-weight:400;letter-spacing:0;text-transform:none;">
            <input type="checkbox" id="autoScroll" checked style="accent-color:var(--accent);margin-right:4px;">Auto-scroll
          </label>
        </div>
        <div class="log-scroll" id="logList"></div>
      </div>

    </div>
  </div>
</div>

<script>
  // ─── State ─────────────────────────────────────────────────────────────────

  let jobs         = [];
  let selectedId   = null;
  let zplOpen      = false;
  let totalJobs    = 0;

  const $jobs      = document.getElementById('jobsList');
  const $log       = document.getElementById('logList');
  const $dot       = document.getElementById('statusDot');
  const $pillJobs  = document.getElementById('pillJobs');
  const $preview   = document.getElementById('previewArea');
  const $frame     = document.getElementById('labelFrame');
  const $meta      = document.getElementById('metaArea');
  const $badge     = document.getElementById('previewBadge');
  const $scroll    = document.getElementById('autoScroll');

  // ─── WebSocket ─────────────────────────────────────────────────────────────

  function connectWS() {
    const ws = new WebSocket(`ws://${location.host}`);

    ws.onopen = () => $dot.className = 'status-dot live';
    ws.onclose = () => {
      $dot.className = 'status-dot';
      setTimeout(connectWS, 2000);
    };

    ws.onmessage = ({ data }) => {
      const { type, payload } = JSON.parse(data);
      if      (type === 'job')        onNewJob(payload);
      else if (type === 'job_update') onJobUpdate(payload);
      else if (type === 'log')        appendLog(payload);
      else if (type === 'cleared')    onCleared();
    };
  }

  function onNewJob(job) {
    jobs.unshift(job);
    if (jobs.length > 200) jobs.pop();
    totalJobs = job.id;
    renderJobsList(job.id);           // flash the new row
    if (!selectedId) selectJob(job.id);
    $pillJobs.textContent = `Jobs: ${totalJobs}`;
  }

  function onJobUpdate(job) {
    const i = jobs.findIndex(j => j.id === job.id);
    if (i >= 0) jobs[i] = { ...jobs[i], ...job };
    renderJobsList(null);
    if (selectedId === job.id) renderPreview(jobs[i >= 0 ? i : 0]);
  }

  function onCleared() {
    jobs = []; selectedId = null; totalJobs = 0; zplOpen = false;
    $jobs.innerHTML = '<div class="empty-msg">Waiting for print jobs&hellip;</div>';
    $log.innerHTML  = '';
    $frame.innerHTML = '<div class="placeholder">No jobs yet.<br>Send a ZPL print job to <strong>TCP :9100</strong>.</div>';
    $meta.innerHTML  = '';
    $badge.textContent = '';
    $pillJobs.textContent = 'Jobs: 0';
  }

  // ─── Initial load ──────────────────────────────────────────────────────────

  async function loadState() {
    const { jobs: j, logs: l, stats } = await fetch('/api/state').then(r => r.json());
    jobs = j;
    totalJobs = stats.totalJobs;
    $pillJobs.textContent = `Jobs: ${totalJobs}`;
    renderJobsList(null);
    l.forEach(appendLog);
    if (jobs.length) selectJob(jobs[0].id);
  }

  // ─── Jobs list render ──────────────────────────────────────────────────────

  function renderJobsList(flashId) {
    if (!jobs.length) {
      $jobs.innerHTML = '<div class="empty-msg">Waiting for print jobs&hellip;</div>';
      return;
    }
    $jobs.innerHTML = jobs.map(j => `
      <div class="job-row ${j.id === selectedId ? 'active' : ''} ${j.id === flashId ? 'new-flash' : ''}"
           data-id="${j.id}" onclick="selectJob(${j.id})">
        <span class="job-num">#${j.id}</span>
        <span class="job-time">${fmtTime(j.ts)}</span>
        <span class="job-addr">${esc(j.clientAddr)}</span>
        ${j.meta.rfidData
          ? `<span class="job-rfid">${esc(j.meta.rfidData.slice(0, 20))}</span>`
          : ''}
        <span class="badge badge-${j.status}">${j.status}</span>
      </div>
    `).join('');
  }

  // ─── Select job ────────────────────────────────────────────────────────────

  async function selectJob(id) {
    selectedId = id;
    renderJobsList(null);

    const job = jobs.find(j => j.id === id);
    if (!job) return;

    renderPreview(job);

    // Lazy-load raw ZPL
    if (!job._zpl) {
      try {
        job._zpl = await fetch(`/api/jobs/${id}/zpl`).then(r => r.text());
        renderPreview(job);   // re-render with ZPL
      } catch (_) {}
    }
  }

  // ─── Preview render ────────────────────────────────────────────────────────

  function renderPreview(job) {
    if (!job) return;
    $badge.textContent = `#${job.id}`;

    // Label image
    if (job.image) {
      $frame.innerHTML = `<img src="data:image/png;base64,${job.image}" alt="Label #${job.id}">`;
    } else if (job.status === 'rendering') {
      $frame.innerHTML = '<div class="placeholder"><div class="spinner"></div></div>';
    } else {
      // Render failed — show ZPL text in the frame
      $frame.innerHTML = `<div class="placeholder" style="font-family:monospace;font-size:10px;text-align:left;max-height:180px;overflow:auto;color:#888;">
        ${esc(job._zpl || 'Render failed — check Labelary connectivity')}
      </div>`;
    }

    // Metadata
    const m = job.meta;
    const rfidRow = m.rfidData ? `
      <div class="meta-card wide">
        <div class="meta-key">RFID Data &nbsp;·&nbsp; ${esc(m.rfidFormat || '')}${m.rfidMem ? ' &nbsp;·&nbsp; Bank: ' + esc(m.rfidMem) : ''}</div>
        <div class="meta-val rfid">${esc(m.rfidData)}</div>
        ${m.epcClass ? `<div class="meta-val epc" style="margin-top:3px;">${esc(m.epcClass)}</div>` : ''}
      </div>
    ` : '';

    const fieldRows = m.fieldData.length ? `
      <div class="meta-card wide">
        <div class="meta-key">Field Data (^FD)</div>
        <div class="meta-val">${esc(m.fieldData.join('  |  '))}</div>
      </div>
    ` : '';

    $meta.innerHTML = `
      <div class="meta-grid">
        <div class="meta-card">
          <div class="meta-key">Job</div>
          <div class="meta-val">#${job.id}</div>
        </div>
        <div class="meta-card">
          <div class="meta-key">Time</div>
          <div class="meta-val">${fmtTimeFull(job.ts)}</div>
        </div>
        <div class="meta-card">
          <div class="meta-key">Client IP</div>
          <div class="meta-val">${esc(job.clientAddr)}</div>
        </div>
        <div class="meta-card">
          <div class="meta-key">Label Size</div>
          <div class="meta-val">${m.widthInches}" × ${m.heightInches}"</div>
        </div>
        <div class="meta-card">
          <div class="meta-key">Status</div>
          <div class="meta-val ${job.status === 'rendered' ? 'green' : ''}">${job.status}</div>
        </div>
        <div class="meta-card">
          <div class="meta-key">ZPL / Qty</div>
          <div class="meta-val">${job.zplLength} bytes &nbsp;·&nbsp; ×${m.quantity}</div>
        </div>
        ${rfidRow}
        ${fieldRows}
      </div>
      <div class="zpl-toggle" onclick="toggleZPL()">
        ${zplOpen ? '▼' : '▶'} Raw ZPL
      </div>
      ${zplOpen && job._zpl
        ? `<div class="zpl-block">${esc(job._zpl)}</div>`
        : ''}
    `;
  }

  function toggleZPL() {
    zplOpen = !zplOpen;
    const job = jobs.find(j => j.id === selectedId);
    if (job) renderPreview(job);
  }

  // ─── Log ───────────────────────────────────────────────────────────────────

  function appendLog(entry) {
    const div = document.createElement('div');
    div.className = 'log-row';
    div.innerHTML =
      `<span class="log-ts">${fmtTime(entry.ts)}</span>` +
      `<span class="log-lvl lvl-${entry.level}">${entry.level.toUpperCase()}</span>` +
      `<span class="log-msg">${esc(entry.message)}</span>`;
    $log.appendChild(div);
    if ($scroll.checked) $log.scrollTop = $log.scrollHeight;
    while ($log.children.length > 600) $log.removeChild($log.firstChild);
  }

  // ─── Clear ─────────────────────────────────────────────────────────────────

  async function clearAll() {
    if (!confirm('Clear all jobs and logs?')) return;
    await fetch('/api/jobs', { method: 'DELETE' });
  }

  // ─── Helpers ───────────────────────────────────────────────────────────────

  function fmtTime(iso) {
    return new Date(iso).toLocaleTimeString('en-US', { hour12: false });
  }
  function fmtTimeFull(iso) {
    return new Date(iso).toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
  }
  function esc(s) {
    return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ─── Init ──────────────────────────────────────────────────────────────────

  connectWS();
  loadState();
</script>
</body>
</html>
