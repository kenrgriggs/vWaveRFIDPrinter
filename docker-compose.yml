services:
  vWaveRFIDPrinter:
    build: .
    image: vwaverfidprinter
    container_name: vWaveRFIDPrinter
    ports:
      - "9100:9100"   # RAW TCP print jobs (point your WaveRFIDPrintAgent here)
      - "8080:8080"   # Web UI
    environment:
      - TCP_PORT=9100
      - HTTP_PORT=8080
      - DPMM=8                                        # 8dpmm = 203 DPI (Printronix T800 default)
      - LABELARY_URL=http://api.labelary.com          # ZPL renderer — needs internet access
      - MAX_JOBS=200
    restart: unless-stopped
